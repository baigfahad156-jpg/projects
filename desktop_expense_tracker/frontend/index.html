<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>Expense Tracker</h1>
      <p>Offline-first Desktop Expense Tracker App</p>

      <div class="summary-card">
        <span>This Month</span>
        <strong id="monthlyTotal">Rs 0</strong>
      </div>

      <label class="month-label">Select Month</label>
      <input type="month" id="monthFilter" />
    </aside>

    <main class="content">
      <section class="form-card">
        <h2 id="formTitle">Add Expense</h2>
        <form id="expenseForm">
          <input type="hidden" id="expenseId" />

          <div class="grid">
            <div>
              <label>Title</label>
              <input type="text" id="title" placeholder="Lunch, Bus fare, Books" required />
            </div>

            <div>
              <label>Amount</label>
              <input type="number" id="amount" placeholder="500" min="1" step="0.01" required />
            </div>

            <div>
              <label>Category</label>
              <select id="category" required>
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Shopping">Shopping</option>
                <option value="Bills">Bills</option>
                <option value="Study">Study</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div>
              <label>Date</label>
              <input type="date" id="expenseDate" required />
            </div>
          </div>

          <label>Note</label>
          <textarea id="note" rows="3" placeholder="Optional note"></textarea>

          <div class="actions">
            <button type="submit" id="saveBtn">Save Expense</button>
            <button type="button" id="cancelBtn" class="secondary hidden">Cancel Edit</button>
          </div>
        </form>
      </section>

      <section class="tools">
        <input type="text" id="searchInput" placeholder="Search expense..." />
        <select id="categoryFilter">
          <option value="All">All Categories</option>
          <option value="Food">Food</option>
          <option value="Travel">Travel</option>
          <option value="Shopping">Shopping</option>
          <option value="Bills">Bills</option>
          <option value="Study">Study</option>
          <option value="Other">Other</option>
        </select>
      </section>

      <section class="dashboard">
        <div class="table-card">
          <h2>Expenses</h2>
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Title</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Note</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="expenseTable"></tbody>
          </table>
        </div>

        <div class="chart-card">
          <h2>Category Summary</h2>
          <div id="chart"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/renderer.js"></script>
</body>
</html>
